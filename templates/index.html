<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Private Space</title>

<style>
* {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}

body {
    margin:0;
    font-family: -apple-system, BlinkMacSystemFont, "San Francisco", sans-serif;
    background: #f2f2f7;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* 전체 카드 */
.card {
    width:100%;
    max-width:360px;
    background:white;
    border-radius:28px;
    padding:32px 24px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.08);
    animation: fadeUp 0.6s ease;
}

/* 타이틀 */
.title {
    font-size:22px;
    font-weight:600;
    text-align:center;
    margin-bottom:28px;
}

/* 입력 영역 */
.form {
    display:flex;
    flex-direction:column;
    gap:14px;
}

/* input */
.input {
    height:48px;
    padding:0 14px;
    border-radius:14px;
    border:1px solid #e5e5ea;
    font-size:15px;
    background:#fafafa;
    transition: all 0.2s ease;
}

/* focus */
.input:focus {
    outline:none;
    border-color:#007aff;
    background:white;
    box-shadow: 0 0 0 3px rgba(0,122,255,0.15);
}

/* 버튼 */
.button {
    height:48px;
    border:none;
    border-radius:14px;
    background:black;
    color:white;
    font-size:15px;
    font-weight:500;
    cursor:pointer;
    transition: all 0.2s ease;
}

/* 버튼 눌림 */
.button:active {
    transform: scale(0.97);
    opacity:0.85;
}

/* 에러 */
.error {
    margin-top:10px;
    text-align:center;
    font-size:13px;
    color:#ff3b30;
}

/* 하단 문구 */
.footer {
    margin-top:24px;
    text-align:center;
    font-size:12px;
    color:#8e8e93;
}

/* 애니메이션 */
@keyframes fadeUp {
    from {
        opacity:0;
        transform: translateY(20px);
    }
    to {
        opacity:1;
        transform: translateY(0);
    }
}
</style>
</head>

<body>

<div class="card">

    <div class="title">Private Space</div>

    <form method="POST" class="form">
        <input
            type="password"
            name="password"
            class="input"
            placeholder="Password"
        >
        <button class="button">Enter</button>
    </form>

    {% if error %}
        <div class="error">Wrong password</div>
    {% endif %}

    <div class="footer">
        Only for us
    </div>

</div>

</body>
</html>
