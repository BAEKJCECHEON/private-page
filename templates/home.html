<!DOCTYPE html>
<html>
<head>
    <title>Home</title>

    <style>
        body {
            margin:0;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background:#f5f5f7;
            padding:40px;
        }

        .container {
            max-width:900px;
            margin:auto;
        }

        h1 {
            font-size:28px;
            font-weight:600;
        }

        .card {
            background:white;
            padding:25px;
            border-radius:18px;
            margin-top:20px;
        }

        input, textarea {
            width:100%;
            padding:10px;
            margin-top:10px;
            border:1px solid #ddd;
            border-radius:8px;
        }

        button {
            margin-top:10px;
            padding:8px 15px;
            border:none;
            border-radius:8px;
            background:black;
            color:white;
        }

        .todo-done {
            text-decoration: line-through;
            color:gray;
        }

        img {
            border-radius:10px;
        }
    </style>
</head>

<body>

<div class="container">

<h1>❤️ {{ dday }} days</h1>

<a href="/logout">Logout</a>

<!-- 💌 -->
<div class="card">
<h3>Letters</h3>

<form method="POST" action="/post">
<textarea name="content" placeholder="Write something..."></textarea>
<button>Add</button>
</form>

{% for p in posts %}
<p>{{p[1]}} <a href="/delete_post/{{p[0]}}">x</a></p>
{% endfor %}
</div>


<!-- ✅ -->
<div class="card">
<h3>Bucket List</h3>

<form method="POST" action="/add_todo">
<input name="text" placeholder="Something we want to do">
<button>Add</button>
</form>

{% for t in todos %}
<p class="{% if t[2] %}todo-done{% endif %}">
<a href="/toggle_todo/{{t[0]}}">✔</a> {{t[1]}}
</p>
{% endfor %}
</div>


<!-- 📅 -->
<div class="card">
<h3>Anniversary</h3>

<form method="POST" action="/add_event">
<input name="title" placeholder="Title">
<input type="date" name="date">
<input name="memo" placeholder="Memo">
<button>Add</button>
</form>

{% for e in events %}
<p>{{e[1]}} - {{e[2]}} <a href="/delete_event/{{e[0]}}">x</a></p>
{% endfor %}
</div>


<!-- 📸 -->
<div class="card">
<h3>Gallery</h3>

<form method="POST" action="/upload_photo" enctype="multipart/form-data">
<input type="file" name="photo">
<input name="caption" placeholder="Caption">
<button>Upload</button>
</form>

<div style="display:flex; gap:10px; flex-wrap:wrap;">
{% for p in photos %}
<div>
<img src="/static/uploads/{{p[1]}}" width="120"><br>
{{p[2]}} <br>
<a href="/delete_photo/{{p[0]}}">x</a>
</div>
{% endfor %}
</div>

</div>

</div>

</body>
</html>
