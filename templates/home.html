<!DOCTYPE html>
<html>
<head>
    <title>비공개공간</title>
    <style>
        body { background:#fff0f5; font-family:sans-serif; padding:20px; }
        .section { background:white; padding:20px; margin-bottom:20px; border-radius:15px; }
        .done { text-decoration: line-through; color:gray; }
    </style>
</head>
<body>

<h1>❤️{{ dday }}일</h1>
<a href="/logout">로그아웃</a>

<!-- 게시판 -->
<div class="section">
<h2>편지</h2>
<form method="POST" action="/post">
<textarea name="content"></textarea>
<button>작성</button>
</form>

<ul>
{% for p in posts %}
<li>{{p[1]}} <a href="/delete_post/{{p[0]}}">삭제</a></li>
{% endfor %}
</ul>
</div>

<!--todo -->
<div class="section">
<h2>하고 싶은 것</h2>
<form method="POST" action="/add_todo">
<input name="text">
<button>추가</button>
</form>

<ul>
{% for t in todos %}
<li class="{% if t[2] %}done{% endif %}">
<a href="/toggle_todo/{{t[0]}}">✔</a> {{t[1]}}
</li>
{% endfor %}
</ul>
</div>

<!-- 기념일 -->
<div class="section">
<h2>기념일</h2>
<form method="POST" action="/add_event">
<input name="title">
<input type="date" name="date">
<input name="memo">
<button>추가</button>
</form>

<ul>
{% for e in events %}
<li>{{e[1]}} - {{e[2]}} <a href="/delete_event/{{e[0]}}">삭제</a></li>
{% endfor %}
</ul>
</div>

<!-- 앨범 -->
<div class="section">
<h2>추억 앨범</h2>

<form method="POST" action="/upload_photo" enctype="multipart/form-data">
<input type="file" name="photo">
<input name="caption">
<button>업로드</button>
</form>

<div>
{% for p in photos %}
<div>
<img src="/static/uploads/{{p[1]}}" width="150"><br>
{{p[2]}}
<a href="/delete_photo/{{p[0]}}">삭제</a>
</div>
{% endfor %}
</div>

</div>

</body>
</html>
