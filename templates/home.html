<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #f5f5f7;
    color: #1d1d1f;
}

/* 전체 컨테이너 */
.container {
    max-width: 720px;
    margin: 60px auto;
    padding: 0 20px;
}

/* 상단 */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 40px;
}

h1 {
    font-size: 28px;
    font-weight: 600;
}

/* 카드 */
.card {
    background: white;
    border-radius: 20px;
    padding: 24px;
    margin-bottom: 30px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.04);
}

/* 입력 */
textarea, input[type="text"], input[type="file"] {
    width: 100%;
    padding: 12px;
    margin-top: 12px;
    border: 1px solid #ddd;
    border-radius: 10px;
    font-size: 14px;
}

/* 버튼 */
button {
    margin-top: 12px;
    padding: 10px 14px;
    border: none;
    border-radius: 10px;
    background: black;
    color: white;
    font-size: 14px;
    cursor: pointer;
}

/* 리스트 아이템 */
.item {
    padding: 14px 0;
    border-bottom: 1px solid #eee;
}

.item:last-child {
    border-bottom: none;
}

/* 메타 정보 */
.meta {
    font-size: 12px;
    color: #86868b;
    margin-top: 4px;
}

/* 갤러리 */
.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    gap: 16px;
    margin-top: 20px;
}

.gallery-item {
    text-align: center;
}

.gallery img {
    width: 100%;
    height: 120px;
    object-fit: cover;
    border-radius: 12px;
}

</style>
</head>

<body>

<div class="container">

<!-- 헤더 -->
<div class="header">
    <h1>❤️ {{ dday }} days</h1>
    <div>{{ user }} | <a href="/logout">Logout</a></div>
</div>

<!-- 💌 Letters -->
<div class="card">
    <h3>Letters</h3>

    <form method="POST" action="/post">
        <textarea name="content" placeholder="Write something..."></textarea>
        <button>Add</button>
    </form>

    {% for p in posts %}
    <div class="item">
        <div>{{ p[1] }}</div>
        <div class="meta">{{ p[2] }} · {{ p[3] }}</div>
    </div>
    {% endfor %}
</div>


<!-- 📸 Gallery -->
<div class="card">
    <h3>Gallery</h3>

    <form method="POST" action="/upload_photo" enctype="multipart/form-data">
        <input type="file" name="photo">
        <input type="text" name="caption" placeholder="Caption">
        <button>Upload</button>
    </form>

    <div class="gallery">
        {% for p in photos %}
        <div class="gallery-item">
            <img src="/static/uploads/{{p[1]}}">
            <div class="meta">{{ p[3] }}</div>
        </div>
        {% endfor %}
    </div>
</div>

</div>

</body>
</html>
