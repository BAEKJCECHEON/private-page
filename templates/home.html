<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
body {
    font-family:-apple-system;
    background:#f5f5f7;
    margin:0;
}

.container {
    max-width:900px;
    margin:40px auto;
    padding:0 20px;
}

.header {
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:30px;
}

h1 { font-size:26px; }

.card {
    background:white;
    border-radius:20px;
    padding:25px;
    margin-bottom:25px;
}

input, textarea {
    width:100%;
    padding:12px;
    margin-top:10px;
    border:1px solid #ddd;
    border-radius:10px;
}

button {
    margin-top:10px;
    padding:10px;
    border:none;
    border-radius:10px;
    background:black;
    color:white;
}

.item {
    padding:10px 0;
    border-bottom:1px solid #eee;
}

.meta {
    font-size:12px;
    color:gray;
}

.done {
    text-decoration:line-through;
    color:gray;
}

.gallery {
    display:grid;
    grid-template-columns:repeat(auto-fill,120px);
    gap:15px;
}

img {
    width:120px;
    height:120px;
    object-fit:cover;
    border-radius:12px;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
    <h1>❤️ {{ dday }} days</h1>
    <div>{{ user }} | <a href="/logout">Logout</a></div>
</div>

<!-- 💌 -->
<div class="card">
<h3>Letters</h3>
<form method="POST" action="/post">
<textarea name="content"></textarea>
<button>Add</button>
</form>

{% for p in posts %}
<div class="item">
    <div>{{p[1]}}</div>
    <div class="meta">{{p[2]}} · {{p[3]}}</div>
</div>
{% endfor %}
</div>

<!-- 📸 -->
<div class="card">
<h3>Gallery</h3>

<form method="POST" action="/upload_photo" enctype="multipart/form-data">
<input type="file" name="photo">
<input name="caption">
<button>Upload</button>
</form>

<div class="gallery">
{% for p in photos %}
<div>
<img src="/static/uploads/{{p[1]}}">
<div class="meta">{{p[3]}}</div>
</div>
{% endfor %}
</div>

</div>

</div>
